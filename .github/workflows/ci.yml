name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test + Lint + Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint (Next.js ESLint)
        # Next 15'te next lint çalışır. Next 16'da ESLint CLI'ya geçilecek.
        run: npm run lint

      - name: Unit tests (Vitest)
        # @workly/shared vitest --passWithNoTests, @workly/web full suite.
        run: npm test

    # NOT: `next build` bilerek CI'da atlandı — Vercel deploy pipeline
    # zaten üretim build'i doğru env değişkenleriyle çalıştırır. CI'da build
    # + Supabase env mock etmek redundant + yavaş.
