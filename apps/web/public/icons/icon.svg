<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#5b4ad6"/>
    </linearGradient>
    <linearGradient id="clock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8f0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Clock face -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#clock)" stroke-width="20"/>
  <!-- Clock hands forming "S" idea: hour at 10, minute at 2 -->
  <line x1="256" y1="256" x2="180" y2="180" stroke="url(#clock)" stroke-width="22" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="340" y2="200" stroke="url(#clock)" stroke-width="18" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="#ffffff"/>
  <!-- Hour marks -->
  <g stroke="url(#clock)" stroke-width="8" stroke-linecap="round">
    <line x1="256" y1="116" x2="256" y2="136"/>
    <line x1="256" y1="376" x2="256" y2="396"/>
    <line x1="116" y1="256" x2="136" y2="256"/>
    <line x1="376" y1="256" x2="396" y2="256"/>
  </g>
</svg>
